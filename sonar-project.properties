# SonarCloud Project Configuration
sonar.projectKey=autoppia_autoppia_iwa
sonar.organization=autoppia

# Project metadata
sonar.projectName=autoppia_iwa
sonar.projectVersion=0.0.1
# New code definition
sonar.newCode.referenceBranch=main

# Source code paths (only existing dirs: no modules/ or scripts/ at repo root)
sonar.sources=autoppia_iwa

# Test paths
sonar.tests=tests

# Exclusions
# Python bytecode and cache
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/*.pyo,**/*.pyd,**/.pytest_cache/**,**/*.egg-info/**

# Generated and output directories
sonar.exclusions+=**/benchmark-output/**,**/data/outputs/**,**/data/benchmark/**,**/data/cache/**,**/data/rl/**,**/data/rm/**,**/data/score_model_pipeline/**,**/data/web_verification/**,**/verification_results/**,**/verification_results_quick/**

# Documentation and non-code files
sonar.exclusions+=**/docs/**,**/*.md,**/*.json,**/*.jsonl,**/*.log,**/*.gif,**/*.webm,**/*.png,**/*.jpg,**/*.jpeg

# Virtual environments
sonar.exclusions+=**/.venv/**,**/venv/**,**/env/**,**/.env**

# IDE and build artifacts
sonar.exclusions+=**/.idea/**,**/build/**,**/.vscode/**,**/notebooks/**,**/.ipynb_checkpoints/**

# Test coverage exclusions (if needed)
sonar.coverage.exclusions=**/tests/**,**/test_*.py,**/conftest.py,**/__init__.py

# Exclude large untested entrypoints and demo project generators from coverage denominator
sonar.coverage.exclusions+=**/entrypoints/benchmark/benchmark.py,**/entrypoints/benchmark/run.py,**/entrypoints/benchmark/config.py
sonar.coverage.exclusions+=**/entrypoints/evaluation/client.py,**/entrypoints/evaluation/endpoint.py
sonar.coverage.exclusions+=**/entrypoints/judge_benchmark/**,**/entrypoints/judge_benchmark_endpoint/**
sonar.coverage.exclusions+=**/entrypoints/technical_test_agent/**,**/entrypoints/test_task.py,**/entrypoints/test_your_agent/**
sonar.coverage.exclusions+=**/entrypoints/web_verification/**
# Exclude demo_webs generation/replace from coverage except autocinema_1
sonar.coverage.exclusions+=**/demo_webs/projects/autobooks_2/generation_functions.py,**/demo_webs/projects/autobooks_2/replace_functions.py
sonar.coverage.exclusions+=**/demo_webs/projects/autozone_3/generation_functions.py,**/demo_webs/projects/autozone_3/replace_functions.py
sonar.coverage.exclusions+=**/demo_webs/projects/autocalendar_11/generation_functions.py
sonar.coverage.exclusions+=**/demo_webs/projects/autoconnect_9/generation_functions.py
sonar.coverage.exclusions+=**/demo_webs/projects/autocrm_5/generation_functions.py
sonar.coverage.exclusions+=**/demo_webs/projects/autodelivery_7/generation_functions.py
sonar.coverage.exclusions+=**/demo_webs/projects/autodining_4/generation_functions.py
sonar.coverage.exclusions+=**/demo_webs/projects/autodrive_13/generation_functions.py
sonar.coverage.exclusions+=**/demo_webs/projects/autohealth_14/generation_functions.py
sonar.coverage.exclusions+=**/demo_webs/projects/autolist_12/generation_functions.py
sonar.coverage.exclusions+=**/demo_webs/projects/autolodge_8/generation_functions.py
sonar.coverage.exclusions+=**/demo_webs/projects/automail_6/generation_functions.py
sonar.coverage.exclusions+=**/demo_webs/projects/autostats_15/generation_functions.py
sonar.coverage.exclusions+=**/demo_webs/projects/autowork_10/generation_functions.py

# Coverage report path (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Python-specific settings
sonar.python.version=3.11

# Encoding
sonar.sourceEncoding=UTF-8
