# SonarCloud Project Configuration
sonar.projectKey=autoppia_autoppia_iwa
sonar.organization=autoppia

# Project metadata
sonar.projectName=autoppia_iwa
sonar.projectVersion=0.0.1

sonar.newCode.referenceBranch=main

# Source code paths
sonar.sources=autoppia_iwa

# Test paths
sonar.tests=tests

# Exclusions (ignore files/folders entirely from analysis)
sonar.exclusions=\
**/__pycache__/**,\
**/*.pyc,\
**/*.pyo,\
**/*.pyd,\
**/.pytest_cache/**,\
**/*.egg-info/**,\
**/benchmark-output/**,\
**/data/outputs/**,\
**/data/benchmark/**,\
**/data/cache/**,\
**/data/rl/**,\
**/data/rm/**,\
**/data/score_model_pipeline/**,\
**/data/web_verification/**,\
**/verification_results/**,\
**/verification_results_quick/**,\
**/docs/**,\
**/*.md,\
**/*.json,\
**/*.jsonl,\
**/*.log,\
**/*.gif,\
**/*.webm,\
**/*.png,\
**/*.jpg,\
**/*.jpeg,\
**/.venv/**,\
**/venv/**,\
**/env/**,\
**/.env/**,\
**/.idea/**,\
**/build/**,\
**/.vscode/**,\
**/notebooks/**,\
**/.ipynb_checkpoints/**

# Coverage exclusions (files to ignore for coverage calculation)
