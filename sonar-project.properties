**/entrypoints/evaluation/client.py,\
**/entrypoints/evaluation/endpoint.py,\
**/entrypoints/judge_benchmark/**,\
**/entrypoints/judge_benchmark_endpoint/**,\
**/entrypoints/technical_test_agent/**,\
**/entrypoints/test_task.py,\
**/entrypoints/test_your_agent/**,\
**/entrypoints/web_verification/**,\
**/demo_webs/projects/autobooks_2/generation_functions.py,\
**/demo_webs/projects/autobooks_2/replace_functions.py,\
**/demo_webs/projects/autozone_3/generation_functions.py,\
**/demo_webs/projects/autozone_3/replace_functions.py,\
**/demo_webs/projects/autocalendar_11/generation_functions.py,\
**/demo_webs/projects/autoconnect_9/generation_functions.py,\
**/demo_webs/projects/autocrm_5/generation_functions.py,\
**/demo_webs/projects/autodelivery_7/generation_functions.py,\
**/demo_webs/projects/autodining_4/generation_functions.py,\
