name: Quality checks

on:
  push:
    branches:
      - main
#TODO: remove this line once integration is done
      - fix/**
#  pull_request:
#    types: [opened, synchronize, reopened] #TODO: remove this line after development is done

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prek:
    name: Prek (pre-commit hooks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: j178/prek-action@v1
        with:
          extra-args: --all-files

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pip-audit

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Install Playwright system dependencies
        run: playwright install-deps chromium

      - name: Audit Python dependencies (pip-audit)
        id: pip_audit
        run: |
          mkdir -p reports
          pip-audit -f json 2>/dev/null > reports/pip-audit.json || true

      - name: Count dependency vulnerabilities
        id: pip_audit_count
        run: |
          PIP_AUDIT_COUNT=$(python3 .github/scripts/pip_audit_count.py 2>/dev/null || echo "0")
          echo "pip_audit_vuln_count=$PIP_AUDIT_COUNT" >> "$GITHUB_OUTPUT"
          echo "pip-audit vulnerability count: $PIP_AUDIT_COUNT"

      - name: Fail if dependency vulnerabilities detected
        if: steps.pip_audit_count.outputs.pip_audit_vuln_count != '0'
        run: |
          pip-audit
          echo "::error::Dependency vulnerabilities found (pip-audit: ${{ steps.pip_audit_count.outputs.pip_audit_vuln_count }}). Fix them before merging."
          exit 1

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=autoppia_iwa --cov-report=xml --cov-report=term
#        continue-on-error: true

      - name: Ensure coverage report exists for SonarCloud
        run: |
          if [ ! -f coverage.xml ]; then
            echo "Creating minimal coverage.xml (tests may have failed)"
            printf '%s\n' '<?xml version="1.0" ?>' '<coverage line-rate="0" branch-rate="0" lines-covered="0" lines-valid="1" branches-covered="0" branches-valid="0" version="1.9" timestamp="0">' '<sources><source>.</source></sources>' '<packages/>' '</coverage>' > coverage.xml
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.branch.name=${{ github.ref_name }}
            -Dsonar.python.coverage.reportPaths=coverage.xml
