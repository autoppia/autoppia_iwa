name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - develop
      - fix/**
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # Required for PR comments
      issues: write  # Required for issue comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=autoppia_iwa --cov=modules --cov=scripts --cov-report=xml --cov-report=term
        continue-on-error: true  # Continue even if tests fail

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: autoppia_autoppia_iwa
          path: .
          format: SARIF
          out: reports
        continue-on-error: true  # Job continues if dependency-check fails (e.g. network)

      - name: Prepare SARIF report for SonarCloud
        id: prepare_sarif
        run: |
          mkdir -p reports
          if ls reports/*.sarif 1>/dev/null 2>&1; then
            f=$(ls reports/*.sarif 2>/dev/null | head -1)
            # Only copy if source is different (Dependency-Check may already output dependency-check-report.sarif)
            if [ "$f" != "reports/dependency-check-report.sarif" ]; then
              cp "$f" reports/dependency-check-report.sarif
            fi
          fi
          echo "sarif_exists=$([ -f reports/dependency-check-report.sarif ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          ls -la reports/

      - name: Upload SARIF reports
        if: steps.prepare_sarif.outputs.sarif_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: reports/
          retention-days: 5

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # SONAR_TOKEN must be configured in repository secrets
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: ${{ steps.prepare_sarif.outputs.sarif_exists == 'true' && '-Dsonar.sarifReportPaths=reports/dependency-check-report.sarif' || '' }}
